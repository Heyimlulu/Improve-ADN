<!DOCTYPE html>
<html>
<head>
  <title>ADN Improver</title>
  <link rel="stylesheet" type="text/css" href="popup.css">
</head>
<body>
    <div class="header">
        <h1>ADN Improver</h1>
    </div>
    <div class="main-content">
        <div class="tabs">
            <button class="tab-link active" data-tab="general">General</button>
            <button class="tab-link" data-tab="manage">Settings</button>
        </div>

        <div id="general" class="tab-content active">
            <p class="info-text">Theater mode is automatically enabled on all video pages.</p>
        </div>

        <div id="manage" class="tab-content">
            <button id="backup">Backup</button>
            <button id="restore">Restore</button>
            <input type="file" id="restore-input" style="display: none;">
            <button id="reset">Reset</button>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
