name: Create Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Select the version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Bump version
        run: npm run version:${{ github.event.inputs.version_type }}

      - name: Build extension
        run: npm run build

      - name: Get build artifact filename
        id: get_artifact
        run: |
          ZIP_FILE=$(ls dist/adn-improver-v*.zip | head -n 1)
          echo "zip_path=$ZIP_FILE" >> $GITHUB_OUTPUT
          echo "zip_name=$(basename $ZIP_FILE)" >> $GITHUB_OUTPUT

      - name: Commit, Tag, and Push Changes
        id: versioning
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'github-actions@github.com'
          git add package.json manifest.json
          # Get the new version from package.json and set it as an output
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          git commit -m "Bump version to v$NEW_VERSION"
          git tag -a "v$NEW_VERSION" -m "Release v$NEW_VERSION"
          git push
          git push --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.versioning.outputs.new_version }}
          name: v${{ steps.versioning.outputs.new_version }}
          body: "Official release for version v${{ steps.versioning.outputs.new_version }}"
          draft: false
          prerelease: false
          files: ${{ steps.get_artifact.outputs.zip_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
