name: Create Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Select the version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Bump version
        run: npm run version:${{ github.event.inputs.version_type }}

      - name: Build extension
        run: npm run build

      - name: Commit, Tag, and Push Changes
        id: versioning
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'github-actions@github.com'
          git add package.json manifest.json
          # Get the new version from package.json and set it as an output
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          git commit -m "Bump version to v$NEW_VERSION"
          git tag -a "v$NEW_VERSION" -m "Release v$NEW_VERSION"
          git push
          git push --tags

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.versioning.outputs.new_version }}
          release_name: Release v${{ steps.versioning.outputs.new_version }}
          body: "Official release for version v${{ steps.versioning.outputs.new_version }}"
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dist/adn-improver-v${{ steps.versioning.outputs.new_version }}.zip
          asset_name: adn-improver-v${{ steps.versioning.outputs.new_version }}.zip
          asset_content_type: application/zip
